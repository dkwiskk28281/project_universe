<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#c8d8ff"/>
      <stop offset="60%" stop-color="#4a6cf7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1a3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b8cff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3a4fa0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle stars -->
  <circle cx="80" cy="100" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="420" cy="80" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="130" cy="400" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="380" cy="350" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="60" cy="280" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="450" cy="200" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="200" cy="60" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="350" cy="450" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="100" cy="200" r="0.6" fill="#ffffff" opacity="0.3"/>
  <circle cx="400" cy="420" r="0.8" fill="#ffffff" opacity="0.35"/>
  <!-- Outer halo -->
  <circle cx="256" cy="256" r="160" fill="url(#halo)"/>
  <!-- Core glow -->
  <circle cx="256" cy="256" r="80" fill="url(#core)"/>
  <!-- Bright center -->
  <circle cx="256" cy="256" r="12" fill="#ffffff"/>
</svg>
