name: EPI Materials Mastery

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "docs/**"
      - "docker-compose.yml"
      - ".github/workflows/epi-materials-mastery.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "docs/**"
      - "docker-compose.yml"
      - ".github/workflows/epi-materials-mastery.yml"

jobs:
  validate-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
